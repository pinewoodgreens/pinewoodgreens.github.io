<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <meta name="description" content="">
    <meta name="author" content="">
    {% feed_meta %}
    <title>{% if page.title %} {{ page.title }} {% endif %}</title>

    <!-- Preconnect to Google Fonts CDN for faster load (INFRA-01) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- LOAD ORDER: Bootstrap must precede pwg.css. pwg.css overrides Bootstrap via
         specificity — reversing this order breaks all design system overrides. (INFRA-05) -->
    <link href="{{site.baseurl}}/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{site.baseurl}}/css/pwg.css" rel="stylesheet">
</head>
